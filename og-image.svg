<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#9a3412"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#9a3412"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="608" cy="355" r="54" fill="#9a3412" opacity="0.08"/>
    <circle cx="-75" cy="276" r="78" fill="#9a3412" opacity="0.07"/>
    <circle cx="822" cy="-2" r="25" fill="#9a3412" opacity="0.05"/>
    <circle cx="69" cy="604" r="59" fill="#9a3412" opacity="0.15"/>
    <circle cx="-78" cy="81" r="56" fill="#9a3412" opacity="0.15"/>
    <circle cx="897" cy="634" r="90" fill="#9a3412" opacity="0.05"/>
    <rect x="233" y="132" width="89" height="73" rx="8" fill="#c2410c" opacity="0.09" transform="rotate(34, 364, 541)"/>
    <rect x="236" y="108" width="35" height="75" rx="8" fill="#c2410c" opacity="0.07" transform="rotate(38, 26, 199)"/>
    <rect x="996" y="530" width="80" height="38" rx="8" fill="#c2410c" opacity="0.04" transform="rotate(21, 786, 25)"/>
    <rect x="153" y="205" width="23" height="92" rx="8" fill="#c2410c" opacity="0.11" transform="rotate(12, 685, 354)"/>
    <rect x="46" y="42" width="37" height="86" rx="8" fill="#c2410c" opacity="0.05" transform="rotate(3, 600, 494)"/>
    <rect x="144" y="708" width="91" height="98" rx="8" fill="#c2410c" opacity="0.14" transform="rotate(4, 866, 45)"/>
    <rect x="890" y="231" width="30" height="49" rx="8" fill="#c2410c" opacity="0.13" transform="rotate(13, -91, -90)"/>
    <rect x="484" y="13" width="36" height="54" rx="8" fill="#c2410c" opacity="0.04" transform="rotate(40, 475, 575)"/>
    <polygon points="1293,355 1345,459 1241,459" fill="#9a3412" opacity="0.13"/>
    <polygon points="366,492 429,618 303,618" fill="#9a3412" opacity="0.07"/>
    <polygon points="563,-54 655,130 471,130" fill="#9a3412" opacity="0.06"/>
    <polygon points="175,544 228,650 122,650" fill="#9a3412" opacity="0.08"/>

  <!-- Wave at bottom -->
  <path d="M0,582 C360,606 840,558 1200,582 L1200,630 L0,630Z" fill="#9a3412" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    마곡 코인노래방 할인
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마곡 — 코인노래방
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#fb923c" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#fb923c" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마곡 마곡 코인노래방 할인 — 코인노래방
  </text>
</svg>